# Aegis Policy File

default_capabilities:
  - log
  - yield

tools:
  default:
    capabilities:
      - http_get
      - kv_set
      - kv_get
    resource_limits:
      memory_mb: 64
      max_operations: 1000000
      max_call_depth: 64
      timeout_seconds: 30
    requires_approval: false

  weather_fetch:
    capabilities:
      - http_get
      - kv_set
    resource_limits:
      memory_mb: 32
      max_operations: 1000000
      max_call_depth: 32
      timeout_seconds: 30
    requires_approval: false
    allowed_domains:
      - api.weather.com
      - api.openweathermap.org
    allowed_key_prefixes:
      - "weather:"

  file_processor:
    capabilities:
      - file_read
      - file_write
    resource_limits:
      memory_mb: 128
      max_operations: 10000000
      max_call_depth: 64
      timeout_seconds: 120
    requires_approval: false
    allowed_paths:
      - /data/input/
      - /data/output/

  deploy_config:
    capabilities:
      - file_write
      - exec
    resource_limits:
      memory_mb: 64
      max_operations: 1000000
      max_call_depth: 32
      timeout_seconds: 60
    requires_approval: true
    allowed_paths:
      - /etc/myapp/